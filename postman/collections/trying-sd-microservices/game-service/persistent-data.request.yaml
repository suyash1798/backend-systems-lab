$kind: websocket-request
name: Persistent Data
url: '{{gameServiceWsUrl}}'
description: |-
  Send this message after `join` succeeds:

  {
    "action": "persistent_data",
    "requestId": "data-1",
    "gameId": "{{gameId}}",
    "data": {
      "freeSpinsLeft": 5,
      "bonusMultiplier": 2
    }
  }
order: 6000
