version: '3.8'
services:
  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=game_service
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  dynamodb:
    image: amazon/dynamodb-local:2.5.2
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    restart: unless-stopped

  wallet-service:
    build: ./services/wallet-service
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/game_service
      - DEFAULT_BALANCE=10000000
    depends_on:
      - postgres
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    ports:
      - "6000:6000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/game_service
      - JWT_SECRET=dev-secret-change-me
      - JWT_TTL_SECONDS=86400
    depends_on:
      - postgres
    restart: unless-stopped

  lobby-service:
    build: ./services/lobby-service
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/game_service
      - JWT_SECRET=dev-secret-change-me
    depends_on:
      - postgres
    restart: unless-stopped

  app-service:
    build: ./services/app-service
    ports:
      - "7000:7000"
    environment:
      - USER_SERVICE_URL=http://user-service:6000
      - LOBBY_SERVICE_URL=http://lobby-service:5000
      - WEBSOCKET_URL=ws://localhost:8080/game/ws
    depends_on:
      - user-service
      - lobby-service
    restart: unless-stopped

  game-service:
    build:
      context: ./services/game-service
      dockerfile: Dockerfile.debug
    command: npm run start:debug
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      - WALLET_URL=http://wallet-service:4000
      - REDIS_URL=redis://redis:6379
      - REDIS_CHANNEL=game-events
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/game_service
      - AWS_REGION=ap-south-1
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - GAME_PLAYER_DATA_TABLE=GamePlayerData
      - JWT_SECRET=dev-secret-change-me
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=game-events
    depends_on:
      - wallet-service
      - redis
      - postgres
      - dynamodb
      - kafka
    restart: unless-stopped

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=game-events
      - KAFKA_GROUP_ID=analytics-service
      - LOG_INTERVAL_SECONDS=10
      - PORT=9000
    depends_on:
      - kafka
    restart: unless-stopped

  nginx-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-service
      - user-service
      - lobby-service
      - game-service
    restart: unless-stopped

  # mock-frontend:
  #   build: ./services/mock-frontend
  #   environment:
  #     - GAME_URL=ws://game-service:3000
  #     - USER_ID=user-1
  #     - ROOM_ID=room-1
  #   depends_on:
  #     - game-service
  #   restart: unless-stopped

  ws-load-tester:
    build: ./services/ws-load-tester
    environment:
      - TARGET_URL=ws://game-service:3000
      - ACTION=ping
      - GAME_ID=slot-1
      - CONNECTIONS=100
      - ROOMS=1
      - RAMP_UP_MS=10000
      - DURATION_MS=60000
      - MESSAGE_INTERVAL_MS=1000
      - LOG_INTERVAL_MS=5000
      - REQUEST_TIMEOUT_MS=5000
      - JOIN_ON_OPEN=false
    depends_on:
      - game-service
    profiles:
      - loadtest

volumes:
  redis-data:
  postgres-data:
  zookeeper-data:
  kafka-data:
  dynamodb-data:
