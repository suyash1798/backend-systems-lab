version: '3.8'
services:
  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  wallet-service:
    build: ./services/wallet-service
    ports:
      - "4000:4000"
    restart: unless-stopped

  game-service:
    build: ./services/game-service
    ports:
      - "3000:3000"
    environment:
      - WALLET_URL=http://wallet-service:4000
    depends_on:
      - wallet-service
    restart: unless-stopped

  mock-frontend:
    build: ./services/mock-frontend
    environment:
      - GAME_URL=ws://game-service:3000
      - USER_ID=user-1
    depends_on:
      - game-service
    restart: unless-stopped

  ws-load-tester:
    build: ./services/ws-load-tester
    environment:
      - TARGET_URL=ws://game-service:3000
      - ACTION=ping
      - CONNECTIONS=10000
      - RAMP_UP_MS=10000
      - DURATION_MS=60000
      - MESSAGE_INTERVAL_MS=1000
    depends_on:
      - game-service
    profiles:
      - loadtest

volumes:
  redis-data:
  zookeeper-data:
  kafka-data:
